<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registation Form</title>
    <link rel="stylesheet" href="Registation_form.css">
</head>

<body>
    
        <h1>School Registation Form</h1>
        <form action="" id="regForm">
           <table>
<tr>
    <td>Roll No :</td>
    <td><input type="text"  id="roll"></td>
</tr>

<tr>
    <td>Student Name :</td>
    <td>
        <input type="text" id="fname" placeholder="First Name">
        <input type="text" id="lname" placeholder="Last Name">
    </td>
</tr>

<tr>
    <td>Father's Name :</td>
    <td><input type="text" id="father"></td>
</tr>

            <tr>
                <td>Date of Birth :</td>
                <td><input type="date" id="dob"></td>
            </tr>

            <tr>
                <td>Mobile No :</td>
                <td>
                   <select id="countryCode">
            <option value="+91">🇮🇳 India (+91)</option>
            <option value="+1">🇺🇸 USA (+1)</option>
            <option value="+44">🇬🇧 UK (+44)</option>
            <option value="+61">🇦🇺 Australia (+61)</option>
            <option value="+971">🇦🇪 UAE (+971)</option>
            <option value="+880">🇧🇩 Bangladesh (+880)</option>
            <option value="+977">🇳🇵 Nepal (+977)</option>
            <option value="+94">🇱🇰 Sri Lanka (+94)</option>
            <option value="+81">🇯🇵 Japan (+81)</option>
            <option value="+49">🇩🇪 Germany (+49)</option>
        </select>

        <input type="tel" id="mobile" placeholder="Enter Mobile Number">
                </td>
            </tr>

            <tr>
                <td>Email :</td>
                <td><input type="email" id="email"></td>
            </tr>

            <tr>
                <td>Password :</td>
                <td><input type="password" id="password"></td>
            </tr>

            <tr>
                <td>Gender :</td>
                <td>
                    <input type="radio" name="gender" id="male">
                    <label for="male">Male</label>

                    <input type="radio" name="gender" id="female">
                    <label for="female">Female</label>
                </td>
            </tr>

            <tr>
                <td>Department :</td>
                <td>
                    <input type="checkbox" class="dept" id="cse">
                    <label for="cse">CSE</label>

                    <input type="checkbox" class="dept" id="it">
                    <label for="it">IT</label>

                    <input type="checkbox" class="dept" id="ece">
                    <label for="ece">ECE</label>

                    <input type="checkbox" class="dept" id="civil">
                    <label for="civil">Civil</label>

                    <input type="checkbox" class="dept" id="mech">
                    <label for="mech">Mech</label>
                </td>
            </tr>

            <tr>
                <td>Course :</td>
                <td>
                    <select id="course">
                        <option>----- Select Current Course -----</option>
                        <option>B.Tech</option>
                        <option>BCA</option>
                        <option>BBA</option>
                        <option>MCA</option>
                        <option>MBA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Student Photo :</td>
                <td><input type="file" id="photo"></td>
            </tr>

            <tr>
                <td>City :</td>
                <td><input type="text"  id="city"></td>
            </tr>

            <tr>
                <td>Address :</td>
                <td>
                    <textarea  id="address" rows="4" cols="30"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Register</button>
                </td>
            </tr>

            

           </table>




        </form>

        <script src="validation.js"></script>
    
</body>

</html>
